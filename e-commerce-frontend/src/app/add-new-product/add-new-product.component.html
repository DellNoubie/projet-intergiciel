<div class="admin-page">
  <div class="page-header">
    <h1 class="page-title">
      {{isNewProduct ? 'Ajouter un produit' : 'Modifier le produit'}}
      <span class="title-bar"></span>
    </h1>
  </div>

  <div class="admin-grid">

    <!-- Formulaire produit -->
    <div class="admin-card">
      <h2 class="card-title">
        <mat-icon>inventory_2</mat-icon>
        Informations du produit
      </h2>

      <form #productForm="ngForm" (ngSubmit)="addProduct(productForm)">

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Nom du produit</mat-label>
          <input matInput placeholder="Ex: Smartphone Galaxy S24" [(ngModel)]="product.productName" name="productName">
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Description</mat-label>
          <input matInput placeholder="Decrivez le produit en quelques mots" [(ngModel)]="product.productDescription" name="productDescription">
        </mat-form-field>

        <div class="native-field">
          <label class="native-field__label">Categorie</label>
          <select class="native-field__select"
                  [(ngModel)]="product.productCategory"
                  name="productCategory">
            <option value="">-- Choisir une categorie --</option>
            <option *ngFor="let cat of categories" [value]="cat">{{cat}}</option>
          </select>
        </div>

        <div class="price-row">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Prix original (Rs.)</mat-label>
            <input matInput placeholder="2500" [(ngModel)]="product.productActualPrice" name="productActualPrice">
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Prix remise (Rs.)</mat-label>
            <input matInput placeholder="1999" [(ngModel)]="product.productDiscountedPrice" name="productDiscountedPrice">
          </mat-form-field>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-clear" mat-stroked-button>Effacer</button>
          <button type="submit" class="btn-submit" *ngIf="isNewProduct">Ajouter le produit</button>
          <button type="submit" class="btn-submit" *ngIf="!isNewProduct">Mettre a jour</button>
        </div>
      </form>
    </div>

    <!-- Upload images -->
    <div class="admin-card">
      <h2 class="card-title">
        <mat-icon>photo_library</mat-icon>
        Images du produit
      </h2>

      <div class="dropzone"
           appDrag
           (files)="fileDropped($event)"
           (click)="selectFile.click()">
        <mat-icon class="dropzone__icon">cloud_upload</mat-icon>
        <p class="dropzone__main">Glisser-deposer ou <span class="dropzone__browse">parcourir</span></p>
        <p class="dropzone__hint">PNG, JPG, JPEG acceptes</p>
      </div>

      <input multiple
             type="file"
             style="display:none;"
             #selectFile
             value="select"
             (change)="onFileSelected($event)">

      <div class="preview-grid" *ngIf="product.productImages?.length > 0">
        <div class="preview-item" *ngFor="let file of product.productImages; let i = index">
          <img [src]="file.url" alt="">
          <button class="preview-item__remove" (click)="removeImages(i)">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
