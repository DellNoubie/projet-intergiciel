<header class="site-header">
  <div class="header-inner">

    <a routerLink="/" class="brand-link">
      <div class="brand-icon">S</div>
      <span class="brand-name">ShopNow</span>
    </a>

    <nav class="header-nav" *ngIf="isLoggedIn()">
      <a routerLink="/"
         routerLinkActive="nav-active"
         [routerLinkActiveOptions]="{exact:true}"
         class="nav-item">Accueil</a>
      <a *ngIf="!isAdmin()"
         routerLink="/cart"
         routerLinkActive="nav-active"
         class="nav-item">Panier</a>
      <a *ngIf="!isAdmin()"
         routerLink="/myOrders"
         routerLinkActive="nav-active"
         class="nav-item">Mes commandes</a>
      <a *ngIf="isAdmin()"
         routerLink="/addNewProduct"
         routerLinkActive="nav-active"
         class="nav-item">Ajouter un produit</a>
      <a *ngIf="isAdmin()"
         routerLink="/showProductDetails"
         routerLinkActive="nav-active"
         class="nav-item">Produits</a>
      <a *ngIf="isAdmin()"
         routerLink="/orderInformation"
         routerLinkActive="nav-active"
         class="nav-item">Commandes</a>
    </nav>

    <div class="header-spacer" *ngIf="!isLoggedIn()"></div>

    <div class="header-actions">
      <button *ngIf="!isLoggedIn()"
              routerLink="/login"
              class="btn-hdr btn-hdr--ghost">Se connecter</button>
      <button *ngIf="!isLoggedIn()"
              routerLink="/register"
              class="btn-hdr btn-hdr--accent">Creer un compte</button>
      <button *ngIf="isLoggedIn()"
              (click)="logout()"
              class="btn-hdr btn-hdr--danger">Deconnexion</button>
    </div>

  </div>
</header>
