<div class="product-page">
  <div class="product-detail">

    <!-- Galerie -->
    <div class="gallery">
      <div class="gallery__main">
        <img [src]="product.productImages && product.productImages.length > 0
               ? product.productImages[selectedProductIndex]?.url
               : 'data:image/svg+xml;charset=UTF-8,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 width%3D%22400%22 height%3D%22400%22%3E%3Crect width%3D%22400%22 height%3D%22400%22 fill%3D%22%23f1f5f9%22%2F%3E%3Ctext x%3D%22200%22 y%3D%22205%22 font-size%3D%2216%22 text-anchor%3D%22middle%22 fill%3D%22%2394a3b8%22%3EAucune image%3C%2Ftext%3E%3C%2Fsvg%3E'"
             class="gallery__img"
             alt="{{product.productName}}">
      </div>
      <div class="gallery__thumbs" *ngIf="product.productImages && product.productImages.length > 1">
        <div class="gallery__thumb"
             *ngFor="let file of product.productImages; let i = index"
             [class.gallery__thumb--active]="i === selectedProductIndex"
             (click)="changeIndex(i)">
          <img [src]="file.url" alt="">
        </div>
      </div>
    </div>

    <!-- Informations -->
    <div class="product-info">
      <h1 class="product-info__name">{{product.productName}}</h1>

      <div class="product-info__price-row">
        <span class="price-current">Rs. {{product.productDiscountedPrice}}</span>
        <span class="price-original" *ngIf="product.productActualPrice !== product.productDiscountedPrice">
          Rs. {{product.productActualPrice}}
        </span>
      </div>

      <div class="product-info__divider"></div>

      <div class="product-info__desc">
        <p class="desc-label">Description</p>
        <p class="desc-text">{{product.productDescription}}</p>
      </div>

      <div class="product-info__divider"></div>

      <div class="product-info__actions">
        <button class="action-btn action-btn--buy" (click)="buyProduct(product.productId)">
          <mat-icon>flash_on</mat-icon>
          Acheter maintenant
        </button>
        <button class="action-btn action-btn--cart" (click)="addToCart(product.productId)">
          <mat-icon>shopping_cart</mat-icon>
          Ajouter au panier
        </button>
      </div>
    </div>

  </div>
</div>
