<div class="auth-page">
  <div class="auth-card auth-card-wide">
    <div class="auth-header">
      <div class="auth-brand-icon">S</div>
      <h1 class="auth-title">Creer un compte</h1>
      <p class="auth-subtitle">Rejoignez notre communaute et decouvrez nos produits</p>
    </div>

    <form #registerForm="ngForm" (ngSubmit)="register(registerForm)">
      <div class="auth-row">
        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Prenom</mat-label>
          <input matInput
                 ngModel
                 name="userFirstName"
                 id="userFirstName"
                 placeholder="Votre prenom">
        </mat-form-field>

        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Nom</mat-label>
          <input matInput
                 ngModel
                 name="userLastName"
                 id="userLastName"
                 placeholder="Votre nom">
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="auth-field">
        <mat-label>Adresse e-mail</mat-label>
        <input matInput
               ngModel
               name="userEmail"
               id="userEmail"
               placeholder="exemple@email.com">
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="auth-field">
        <mat-label>Mot de passe</mat-label>
        <input type="password"
               matInput
               ngModel
               name="userPassword"
               id="userPassword"
               placeholder="Choisissez un mot de passe solide">
        <mat-icon matSuffix>lock</mat-icon>
      </mat-form-field>

      <button type="submit" class="auth-submit">Creer mon compte</button>
    </form>
  </div>
</div>
