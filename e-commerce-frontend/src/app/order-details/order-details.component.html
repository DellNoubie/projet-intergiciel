<div class="admin-page">
  <div class="page-header">
    <h1 class="page-title">Gestion des commandes <span class="title-bar"></span></h1>
  </div>

  <div class="toolbar-row">
    <div class="filter-tabs">
      <button class="filter-tab" (click)="getAllOrderDetailsForAdmin('All')">Toutes</button>
      <button class="filter-tab" (click)="getAllOrderDetailsForAdmin('Placed')">En cours</button>
      <button class="filter-tab" (click)="getAllOrderDetailsForAdmin('Delivered')">Livrees</button>
    </div>
    <button class="btn-print" (click)="getReport()">
      <mat-icon>print</mat-icon>
      Imprimer
    </button>
  </div>

  <div class="table-card">
    <table mat-table [dataSource]="dataSource" class="w-100">

      <ng-container matColumnDef="Id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let element">
          <span class="cell-id">#{{element.orderId}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="Product Name">
        <th mat-header-cell *matHeaderCellDef>Produit</th>
        <td mat-cell *matCellDef="let element">
          <span class="cell-primary">{{element.productName}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="Name">
        <th mat-header-cell *matHeaderCellDef>Client</th>
        <td mat-cell *matCellDef="let element">{{element.userEmail}}</td>
      </ng-container>

      <ng-container matColumnDef="Address">
        <th mat-header-cell *matHeaderCellDef>Adresse</th>
        <td mat-cell *matCellDef="let element">{{element.orderAddress}}</td>
      </ng-container>

      <ng-container matColumnDef="Contact No.">
        <th mat-header-cell *matHeaderCellDef>Qte</th>
        <td mat-cell *matCellDef="let element">{{element.quantity}}</td>
      </ng-container>

      <ng-container matColumnDef="Status">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let element">
          <span class="status-pill"
                [ngClass]="element.orderStatus === 'Delivered' ? 'status-delivered' : 'status-placed'">
            {{element.orderStatus === 'Delivered' ? 'Livre' : 'En cours'}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="Action">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let element">
          <button *ngIf="element.orderStatus === 'Placed'"
                  class="btn-deliver"
                  (click)="markAsDelivered(element.orderId)">
            Marquer livre
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
