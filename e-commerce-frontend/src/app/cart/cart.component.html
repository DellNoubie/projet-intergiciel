<div class="cart-page">
  <div class="page-header">
    <h1 class="page-title">Mon panier <span class="title-bar"></span></h1>
  </div>

  <!-- Panier vide -->
  <div class="cart-empty" *ngIf="cartDetails.length === 0">
    <mat-icon class="cart-empty__icon">shopping_cart</mat-icon>
    <h2 class="cart-empty__title">Votre panier est vide</h2>
    <p class="cart-empty__text">Parcourez nos produits et ajoutez des articles a votre panier.</p>
    <a routerLink="/" class="cart-empty__cta">Parcourir le catalogue</a>
  </div>

  <!-- Contenu panier -->
  <div class="cart-layout" *ngIf="cartDetails.length > 0">

    <div class="cart-items">
      <div class="cart-item" *ngFor="let element of cartDetails">
        <div class="cart-item__thumb"></div>
        <div class="cart-item__details">
          <p class="cart-item__name">{{element.productName}}</p>
          <p class="cart-item__price">Rs. {{element.productPrice}}</p>
        </div>
        <button class="cart-item__delete" (click)="delete(element.cartId)" title="Supprimer">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </div>
    </div>

    <div class="cart-summary">
      <h2 class="cart-summary__title">Recapitulatif de commande</h2>

      <div class="cart-summary__line">
        <span>Nombre d'articles</span>
        <span class="cart-summary__val">{{cartDetails.length}}</span>
      </div>
      <div class="cart-summary__line cart-summary__line--total">
        <span>Total estimatif</span>
        <span class="cart-summary__total">—</span>
      </div>

      <button class="cart-summary__checkout"
              (click)="checkout()"
              [disabled]="cartDetails.length === 0">
        Passer la commande
      </button>

      <a routerLink="/" class="cart-summary__continue">Continuer mes achats</a>
    </div>

  </div>
</div>
