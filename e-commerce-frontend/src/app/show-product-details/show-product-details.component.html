<div class="admin-page">
  <div class="page-header">
    <h1 class="page-title">Gestion des produits <span class="title-bar"></span></h1>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Rechercher un produit</mat-label>
      <input matInput
             #searchkeyword
             (keyup)="searchByKeyword(searchkeyword.value)"
             name="searchKey"
             id="searchKey"
             placeholder="Nom, description...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <button class="btn-print" (click)="getReport()">
      <mat-icon>print</mat-icon>
      Imprimer
    </button>
  </div>

  <div class="table-card" *ngIf="showTable">
    <table mat-table [dataSource]="productDetails" class="w-100" [trackBy]="trackByProductId">

      <ng-container matColumnDef="Id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let element">
          <span class="cell-id">#{{element.productId}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="Product Name">
        <th mat-header-cell *matHeaderCellDef>Produit</th>
        <td mat-cell *matCellDef="let element">
          <span class="cell-primary">{{element.productName}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="Category">
        <th mat-header-cell *matHeaderCellDef>Categorie</th>
        <td mat-cell *matCellDef="let element">
          <span class="cell-category" *ngIf="element.productCategory">{{element.productCategory}}</span>
          <span class="cell-none" *ngIf="!element.productCategory">—</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let element">
          <span class="cell-desc">{{element.productDescription}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="Product Discounted Price">
        <th mat-header-cell *matHeaderCellDef>Prix remise</th>
        <td mat-cell *matCellDef="let element">
          <span class="cell-price">Rs. {{element.productDiscountedPrice}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="Product Actual Price">
        <th mat-header-cell *matHeaderCellDef>Prix original</th>
        <td mat-cell *matCellDef="let element">
          <span class="cell-price-original">Rs. {{element.productActualPrice}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="Actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <div class="action-group">
            <button class="action-btn" title="Voir les images" (click)="showImages(element)">
              <mat-icon>image</mat-icon>
            </button>
            <button class="action-btn action-btn--edit" title="Modifier" (click)="editProductDetails(element.productId)">
              <mat-icon>edit</mat-icon>
            </button>
            <button class="action-btn action-btn--danger" title="Supprimer" (click)="deleteProduct(element.productId)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" [trackBy]="trackByProductId"></tr>
    </table>

    <div class="load-more-row" *ngIf="showLoadMoreProductButton">
      <button class="btn-load-more" (click)="loadMoreProduct()">Charger plus de produits</button>
    </div>
  </div>
</div>
