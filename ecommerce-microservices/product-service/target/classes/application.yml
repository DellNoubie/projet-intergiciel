server:
  port: 8083

spring:
  application:
    name: PRODUCT-SERVICE

  datasource:
    url: jdbc:postgresql://postgres-product:5432/product_db
    driver-class-name: org.postgresql.Driver
    username: admin
    password: admin123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.ecommerce.product: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  # Permet à la gateway de fetcher /product-service/api-docs
  # en retirant le préfixe automatiquement
  use-management-port: false
