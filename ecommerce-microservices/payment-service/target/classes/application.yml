server:
  port: 8085

spring:
  application:
    name: PAYMENT-SERVICE

  datasource:
    url: jdbc:h2:mem:payment_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ✅ Fix bug monolithe : clés Razorpay dans la config, jamais dans le code !
# En production → variables d'environnement : RAZORPAY_KEY_ID et RAZORPAY_KEY_SECRET
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_AXBzvN2fkD4ESK}
    secret: ${RAZORPAY_KEY_SECRET:bsZmiVD7p1GMo6hAWiy4SHSH}

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  timelimiter:
    configs:
      default:
        timeout-duration: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.ecommerce.payment: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html